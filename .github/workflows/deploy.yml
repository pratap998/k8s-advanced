name: Deploy to Tomcat

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build WAR
        run: mvn clean package

      - name: Deploy to Server
        run: |
          scp target/app.war user@server:/opt/tomcat/webapps/
